<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>دكان | Dokan</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&family=Playfair+Display:wght@400;700&family=Archivo:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --ink:#0a0a0a;
  --paper:#fafaf8;
  --white:#ffffff;
  --dust:#f0ede8;
  --line:#e2ddd8;
  --muted:#9a9590;
  --mid:#6b6560;
  --display:'Playfair Display',serif;
  --body-ar:'IBM Plex Sans Arabic',sans-serif;
  --body-en:'Archivo',sans-serif;
}
html[lang=ar]{font-family:var(--body-ar)}
html[lang=en]{font-family:var(--body-en);direction:ltr}
body{background:var(--paper);color:var(--ink);min-height:100vh;overflow-x:hidden}
img{display:block}
button{font-family:inherit;cursor:pointer}

/* ─── NAV ─── */
nav{
  position:fixed;top:0;left:0;right:0;z-index:200;
  background:var(--paper);border-bottom:1px solid var(--line);
  display:flex;align-items:center;height:52px;
  direction:ltr;
}
/* لوجو: عربي=يسار(order1) | إنجليزي=يمين(order3) */
.nav-logo-wrap{
  display:flex;align-items:center;justify-content:center;
  height:100%;flex-shrink:0;padding:0 1.25rem;
}
html[lang=ar] .nav-logo-wrap{order:1;border-right:1px solid var(--line)}
html[lang=en] .nav-logo-wrap{order:3;border-left:1px solid var(--line)}
.nav-logo-wrap button{background:none;border:none;display:flex;align-items:center}
.nav-logo-wrap img{height:24px;width:auto}
/* فراغ */
.nav-spacer{flex:1;order:2}
/* أيقونات: عربي=يمين(order3) | إنجليزي=يسار(order1) */
/* ترتيب DOM دايماً: ☰ EN 🛒 — عربي بيعكسهم بـ flex-direction:row-reverse */
.nav-actions{
  display:flex;align-items:center;height:100%;flex-shrink:0;
}
html[lang=ar] .nav-actions{order:3;border-left:1px solid var(--line);flex-direction:row-reverse}
html[lang=en] .nav-actions{order:1;border-right:1px solid var(--line);flex-direction:row}
.menu-btn{
  background:none;border:none;padding:0 16px;height:100%;
  display:flex;align-items:center;color:var(--ink);transition:background .15s;
  border-right:1px solid var(--line);
}
html[lang=ar] .menu-btn{border-right:none;border-left:1px solid var(--line)}
.menu-btn svg{width:18px;height:18px;stroke:currentColor;stroke-width:1.5;fill:none}
.menu-btn:hover{background:var(--dust)}
.lang-btn{
  background:none;border:none;padding:0 14px;font-size:.7rem;
  font-weight:600;letter-spacing:.12em;height:100%;color:var(--mid);
  transition:all .2s;border-right:1px solid var(--line);
}
html[lang=ar] .lang-btn{border-right:none;border-left:1px solid var(--line)}
.lang-btn:hover{background:var(--ink);color:var(--white)}
.cart-btn{
  position:relative;background:none;border:none;padding:0 14px;
  display:flex;align-items:center;height:100%;
}
.cart-btn svg{width:20px;height:20px}
.cart-badge{
  position:absolute;top:6px;right:6px;background:var(--ink);color:#fff;
  font-size:9px;width:14px;height:14px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  opacity:0;transition:opacity .2s;
}
.cart-badge.show{opacity:1}
.nav-pages-wrap{display:none}

/* ─── VIEWS ─── */
.view{display:none;padding-top:52px}
.view.active{display:block}

/* ─── HOME ─── */
.home-hero{
  display:grid;grid-template-columns:1fr 1fr;
  height:calc(100vh - 52px);
  max-height:600px;
  margin:2rem auto;
  max-width:860px;
  gap:.75rem;
  padding:0 1.5rem;
}
.home-panel{
  position:relative;overflow:hidden;cursor:pointer;background:var(--dust);
  border-radius:2px;
}
.home-panel img{
  width:100%;height:100%;object-fit:cover;
  transition:transform .7s cubic-bezier(.25,.46,.45,.94);
  filter:brightness(.65);
}
.home-panel:hover img{transform:scale(1.06)}
.home-panel-overlay{
  position:absolute;inset:0;
  display:flex;flex-direction:column;
  justify-content:flex-end;
  padding:1.5rem;
  background:linear-gradient(to top, rgba(0,0,0,.65) 0%, rgba(0,0,0,0) 55%);
}
.home-panel-label{
  font-family:var(--display);
  font-size:clamp(1.1rem,2.5vw,1.8rem);
  font-weight:400;color:#fff;
  line-height:1.1;margin-bottom:.35rem;
  letter-spacing:-.01em;
}
.home-panel-sub{
  font-size:.6rem;font-weight:600;letter-spacing:.15em;
  text-transform:uppercase;color:rgba(255,255,255,.7);
}
.home-panel-arrow{
  display:inline-flex;align-items:center;gap:8px;
  margin-top:.85rem;font-size:.65rem;font-weight:600;letter-spacing:.1em;
  text-transform:uppercase;color:#fff;opacity:0;
  transform:translateY(8px);transition:all .3s;
}
.home-panel:hover .home-panel-arrow{opacity:1;transform:translateY(0)}

/* ─── SIDEBAR ─── */
.sb-overlay{position:fixed;inset:0;background:rgba(10,10,10,.4);z-index:300;opacity:0;pointer-events:none;transition:opacity .25s}
.sb-overlay.open{opacity:1;pointer-events:all}
.sidebar{
  position:fixed;top:0;bottom:0;width:300px;background:var(--paper);z-index:301;
  display:flex;flex-direction:column;padding-top:52px;transition:transform .3s cubic-bezier(.25,.46,.45,.94);
}
html[lang=ar] .sidebar{right:0;left:auto;transform:translateX(100%);border-inline-start:1px solid var(--line)}
html[lang=ar] .sidebar.open{transform:translateX(0)}
html[lang=en] .sidebar{left:0;right:auto;transform:translateX(-100%);border-inline-end:1px solid var(--line)}
html[lang=en] .sidebar.open{transform:translateX(0)}
.sb-head{padding:1.25rem 1.5rem;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center}
.sb-head-label{font-size:.6rem;font-weight:700;letter-spacing:.2em;text-transform:uppercase;color:var(--muted)}
.sb-close{background:none;border:none;font-size:1rem;color:var(--mid);padding:4px}
.sb-items{flex:1;overflow-y:auto}
.sb-item{
  display:flex;align-items:center;justify-content:space-between;
  padding:1.1rem 1.5rem;cursor:pointer;border-bottom:1px solid var(--line);
  transition:background .15s;
}
.sb-item:hover{background:var(--dust)}
.sb-item-name{font-size:.88rem;font-weight:500}
.sb-item-sub{font-size:.68rem;color:var(--muted);margin-top:2px}
.sb-item-arrow{color:var(--muted);font-size:.8rem}

/* ─── SHOP ─── */
.shop-wrap{min-height:calc(100vh - 52px)}
.shop-header{
  padding:2.5rem 2.5rem 0;
  border-bottom:1px solid var(--line);
  margin-bottom:2.5rem;
  padding-bottom:1.25rem;
}
.shop-header-label{font-size:.6rem;font-weight:700;letter-spacing:.2em;text-transform:uppercase;color:var(--muted);margin-bottom:.35rem}
.shop-header-title{font-family:var(--display);font-size:clamp(1.8rem,4vw,3rem);font-weight:400;letter-spacing:-.02em}
.products-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
  gap:0;
  padding:0 2rem 3rem;
}

/* ─── CARD ─── */
.card{cursor:pointer;border:1px solid transparent;transition:border-color .2s;padding:.75rem}
.card:hover{border-color:var(--line);background:var(--white)}
.card-img{
  aspect-ratio:3/4;background:var(--dust);overflow:hidden;position:relative;
  margin-bottom:.85rem;
}
.card-img img{width:100%;height:100%;object-fit:cover;transition:transform .5s cubic-bezier(.25,.46,.45,.94)}
.card:hover .card-img img{transform:scale(1.05)}
.card-badge{
  position:absolute;top:10px;background:var(--ink);color:#fff;
  font-size:.55rem;padding:3px 8px;letter-spacing:.12em;text-transform:uppercase;font-weight:600;
}
html[lang=ar] .card-badge{right:10px}
html[lang=en] .card-badge{left:10px}
.card-name{font-size:.88rem;font-weight:500;margin-bottom:3px;line-height:1.3}
.card-cat{font-size:.65rem;color:var(--muted);letter-spacing:.05em;margin-bottom:.6rem}
.card-bottom{display:flex;align-items:center;justify-content:space-between;margin-bottom:.6rem}
.card-price{font-size:.92rem;font-weight:600}
.card-dots{display:flex;gap:4px}
.cdot{width:10px;height:10px;border-radius:50%;border:1px solid var(--line)}
.card-btns{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.card-btn-buy{
  background:var(--ink);color:#fff;border:none;
  padding:9px 0;font-size:.62rem;font-weight:600;letter-spacing:.1em;text-transform:uppercase;
  transition:background .2s;
}
.card-btn-buy:hover{background:var(--mid)}
.add-quick{
  background:none;color:var(--ink);border:1px solid var(--line);
  padding:9px 0;font-size:.62rem;font-weight:600;letter-spacing:.1em;text-transform:uppercase;
  transition:all .2s;
}
.add-quick:hover{background:var(--dust)}

/* ─── PRODUCT PAGE ─── */
.prod-wrap{display:grid;grid-template-columns:1fr 1fr;min-height:calc(100vh - 52px)}
.prod-gallery{background:var(--dust);position:sticky;top:52px;height:calc(100vh - 52px);display:flex;flex-direction:column}
.gallery-main{flex:1;overflow:hidden}
.gallery-main img{width:100%;height:100%;object-fit:cover;transition:opacity .25s}
.gallery-thumbs{display:flex;gap:4px;padding:8px;background:var(--white);border-top:1px solid var(--line);overflow-x:auto}
.thumb{width:52px;height:52px;object-fit:cover;flex-shrink:0;border:2px solid transparent;cursor:pointer;opacity:.45;transition:all .2s}
.thumb.active{border-color:var(--ink);opacity:1}
.prod-info{padding:3rem 2.5rem;overflow-y:auto;max-height:calc(100vh - 52px)}
.back-btn{
  display:inline-flex;align-items:center;gap:6px;
  background:none;border:none;font-size:.65rem;font-weight:600;letter-spacing:.1em;
  text-transform:uppercase;color:var(--muted);margin-bottom:2rem;transition:color .2s;
}
.back-btn:hover{color:var(--ink)}
.prod-name{font-family:var(--display);font-size:clamp(1.4rem,2.5vw,2.2rem);font-weight:400;line-height:1.15;margin-bottom:.5rem;letter-spacing:-.01em}
.prod-price{font-size:1.1rem;font-weight:600;margin-bottom:.5rem}
.prod-cat{font-size:.65rem;color:var(--muted);letter-spacing:.1em;text-transform:uppercase;margin-bottom:1.5rem}
.prod-desc{font-size:.84rem;color:var(--mid);line-height:1.85;margin-bottom:1.75rem;border-top:1px solid var(--line);padding-top:1.25rem}
.opt-label{font-size:.6rem;font-weight:700;letter-spacing:.15em;text-transform:uppercase;color:var(--muted);margin-bottom:.55rem}
.color-row{display:flex;gap:8px;margin-bottom:.3rem}
.color-sw{width:24px;height:24px;border-radius:50%;border:2px solid transparent;cursor:pointer;transition:border-color .15s}
.color-sw.active{border-color:var(--ink)!important}
.color-name-label{font-size:.75rem;color:var(--mid);margin-bottom:1.4rem;min-height:16px}
.size-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:1.5rem}
.sz{
  border:1px solid var(--line);padding:8px 16px;font-size:.75rem;font-weight:500;
  background:none;color:var(--ink);transition:all .15s;
}
.sz:hover,.sz.active{background:var(--ink);color:#fff;border-color:var(--ink)}
.qty-row{display:flex;align-items:center;gap:14px;margin-bottom:1.5rem}
.qty-label{font-size:.6rem;font-weight:700;letter-spacing:.15em;text-transform:uppercase;color:var(--muted)}
.qty-ctrl{display:flex;align-items:center;border:1px solid var(--line)}
.qty-btn{background:none;border:none;width:36px;height:36px;font-size:1.1rem;color:var(--ink);transition:background .15s}
.qty-btn:hover{background:var(--dust)}
.qty-val{width:42px;text-align:center;font-size:.88rem;font-weight:600;border:none;border-right:1px solid var(--line);border-left:1px solid var(--line);padding:0;background:none}
.btn-buy{
  display:block;width:100%;background:var(--ink);color:#fff;border:none;
  padding:14px;font-size:.72rem;font-weight:700;letter-spacing:.14em;text-transform:uppercase;
  margin-bottom:8px;transition:background .2s;
}
.btn-buy:hover{background:var(--mid)}
.btn-add{
  display:block;width:100%;background:none;color:var(--ink);
  border:1px solid var(--ink);padding:13px;font-size:.72rem;font-weight:600;
  letter-spacing:.14em;text-transform:uppercase;transition:all .2s;
}
.btn-add:hover{background:var(--dust)}
.prod-notice{
  margin-top:1.5rem;padding:1rem 1.25rem;
  background:var(--dust);border-right:3px solid var(--ink);
  font-size:.72rem;color:var(--mid);line-height:1.65;
}
html[lang=en] .prod-notice{border-right:none;border-left:3px solid var(--ink)}

/* ─── SIZE CHART ─── */
.chart-wrap{max-width:700px;padding:3rem 2.5rem}
.chart-wrap h1{font-family:var(--display);font-size:2rem;font-weight:400;margin-bottom:2.5rem;letter-spacing:-.01em}
.chart-section{margin-bottom:2.5rem}
.chart-section-title{font-size:.6rem;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);margin-bottom:1rem;padding-bottom:.75rem;border-bottom:1px solid var(--line)}
.size-table{width:100%;border-collapse:collapse;font-size:.82rem}
.size-table th{text-align:center;padding:10px 14px;font-size:.6rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);border-bottom:1px solid var(--line)}
.size-table td{padding:10px 14px;text-align:center;border-bottom:1px solid var(--line);color:var(--ink)}
.size-table tbody tr:hover td{background:var(--dust)}
.size-table td:first-child{font-weight:700}
.chart-note{font-size:.68rem;color:var(--muted);margin-top:.6rem}

/* ─── CHECKOUT ─── */
.co-wrap{padding:3rem 2.5rem;min-height:calc(100vh - 52px)}
.co-layout{display:grid;grid-template-columns:1fr 360px;gap:3rem;max-width:980px}
.co-section-label{font-size:.6rem;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);margin-bottom:1.5rem;padding-bottom:.75rem;border-bottom:1px solid var(--line)}
.co-page-title{font-family:var(--display);font-size:1.8rem;font-weight:400;margin-bottom:2rem;letter-spacing:-.01em}
.field-group{margin-bottom:1rem}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:.75rem;margin-bottom:.75rem}
.field-row.full{grid-template-columns:1fr}
.field label{display:block;font-size:.6rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:.35rem}
.field input,.field select,.field textarea{
  width:100%;border:1px solid var(--line);padding:11px 12px;
  font-size:.85rem;font-family:inherit;background:var(--white);color:var(--ink);
  transition:border-color .2s;outline:none;border-radius:0;
}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--ink)}
.field textarea{height:75px;resize:none}
.pay-opts{display:flex;flex-direction:column;gap:.5rem}
.pay-opt{
  display:flex;align-items:center;gap:12px;padding:14px 16px;
  border:1px solid var(--line);cursor:pointer;transition:all .15s;
}
.pay-opt:has(input:checked){border-color:var(--ink);background:var(--dust)}
.pay-opt input{accent-color:var(--ink);width:15px;height:15px;flex-shrink:0}
.pay-opt-name{font-size:.84rem;font-weight:500}
.pay-opt-sub{font-size:.68rem;color:var(--muted);margin-top:2px}
.place-btn{
  display:block;width:100%;background:var(--ink);color:#fff;border:none;
  padding:15px;font-size:.72rem;font-weight:700;letter-spacing:.14em;
  text-transform:uppercase;margin-top:1.5rem;transition:background .2s;
}
.place-btn:hover{background:var(--mid)}
/* order summary */
.order-box{background:var(--dust);padding:1.5rem;position:sticky;top:72px;align-self:start}
.order-box-title{font-size:.6rem;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);margin-bottom:1.1rem}
.order-items{display:flex;flex-direction:column;gap:.85rem;margin-bottom:1.25rem;padding-bottom:1.25rem;border-bottom:1px solid var(--line)}
.order-item{display:grid;grid-template-columns:50px 1fr auto;gap:10px;align-items:start}
.order-item img{width:50px;height:62px;object-fit:cover;background:var(--white)}
.order-item-name{font-size:.78rem;font-weight:500;margin-bottom:2px}
.order-item-sub{font-size:.65rem;color:var(--muted)}
.order-item-price{font-size:.78rem;font-weight:600}
.order-row{display:flex;justify-content:space-between;font-size:.8rem;margin-bottom:.45rem;color:var(--mid)}
.order-row.total{font-weight:700;font-size:.9rem;color:var(--ink);margin-top:.75rem;padding-top:.75rem;border-top:1px solid var(--line)}
.order-notice{font-size:.68rem;color:var(--muted);margin-top:1rem;padding-top:.9rem;border-top:1px solid var(--line);line-height:1.6}

/* ─── SUCCESS ─── */
.success-wrap{
  min-height:calc(100vh - 52px);
  display:flex;align-items:center;justify-content:center;
  flex-direction:column;gap:1rem;padding:3rem;text-align:center;
}
.success-icon{font-size:2.5rem;margin-bottom:.5rem}
.success-wrap h2{font-family:var(--display);font-size:2rem;font-weight:400}
.success-wrap p{font-size:.85rem;color:var(--mid);line-height:1.8;max-width:380px}
.success-back{
  margin-top:1.25rem;border:1px solid var(--ink);padding:12px 28px;
  font-size:.7rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;
  background:none;transition:all .2s;
}
.success-back:hover{background:var(--ink);color:#fff}

/* ─── CART DRAWER ─── */
.c-overlay{position:fixed;inset:0;background:rgba(10,10,10,.4);z-index:400;opacity:0;pointer-events:none;transition:opacity .25s}
.c-overlay.open{opacity:1;pointer-events:all}
.c-drawer{
  position:fixed;top:0;bottom:0;width:min(380px,100vw);background:var(--paper);
  z-index:401;display:flex;flex-direction:column;transition:transform .3s cubic-bezier(.25,.46,.45,.94);
}
html[lang=ar] .c-drawer{right:0;left:auto;transform:translateX(100%);border-inline-start:1px solid var(--line)}
html[lang=ar] .c-drawer.open{transform:translateX(0)}
html[lang=en] .c-drawer{left:0;right:auto;transform:translateX(-100%);border-inline-end:1px solid var(--line)}
html[lang=en] .c-drawer.open{transform:translateX(0)}
.c-head{padding:1.1rem 1.4rem;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center}
.c-head-title{font-size:.6rem;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:var(--muted)}
.x-btn{background:none;border:none;font-size:1rem;color:var(--mid)}
.c-body{flex:1;overflow-y:auto;padding:1rem 1.4rem}
.c-empty{color:var(--muted);font-size:.82rem;text-align:center;margin-top:3rem}
.ci{display:grid;grid-template-columns:60px 1fr auto;gap:10px;padding:12px 0;border-bottom:1px solid var(--line);align-items:start}
.ci img{width:60px;height:74px;object-fit:cover;background:var(--dust)}
.ci-name{font-size:.8rem;font-weight:500;margin-bottom:3px}
.ci-sub{font-size:.68rem;color:var(--muted)}
.ci-rm{background:none;border:none;color:var(--muted);font-size:.65rem;margin-top:4px;text-decoration:underline}
.ci-price{font-size:.8rem;font-weight:600}
.c-foot{padding:1.1rem 1.4rem;border-top:1px solid var(--line)}
.c-total{display:flex;justify-content:space-between;font-size:.88rem;font-weight:600;margin-bottom:.85rem}
.co-btn-drawer{
  display:block;width:100%;background:var(--ink);color:#fff;border:none;
  padding:13px;font-size:.7rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;
  transition:background .2s;
}
.co-btn-drawer:hover{background:var(--mid)}

/* ─── TOAST ─── */
.toast{
  position:fixed;bottom:2rem;left:50%;
  transform:translateX(-50%) translateY(1.5rem);
  background:var(--ink);color:#fff;
  padding:12px 20px;font-size:.75rem;
  display:flex;gap:12px;align-items:center;
  z-index:500;opacity:0;transition:all .3s;
  pointer-events:none;white-space:nowrap;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);pointer-events:all}
.t-co{background:none;border:1px solid rgba(255,255,255,.35);color:#fff;padding:5px 12px;font-size:.68rem;font-weight:600;letter-spacing:.08em}
.t-view{background:none;border:none;color:rgba(255,255,255,.55);font-size:.68rem;text-decoration:underline}

/* ─── PAGE LOGO ─── */
.page-logo{display:flex;justify-content:center;padding:2.5rem 0 0;margin-bottom:0}
.page-logo img{height:60px;width:auto}

@media(max-width:768px){
  .nav-pages-wrap{display:none}
  .home-hero{grid-template-columns:1fr;height:auto;max-height:none;gap:.5rem;padding:0 .75rem;margin:1rem auto}
  .home-panel{height:52vw;min-height:200px;max-height:280px}
  .home-panel-overlay{padding:1rem}
  .home-panel-label{font-size:1.2rem}

  {id:8,cat:'full',nameAr:'حجابي — English',nameEn:'Hijabi — English',descAr:'بكم طويل اوفر سايز للمحجبات',descEn:'Oversized long sleeve — Hijabi',price:700,badge:null,sizes:['S','M','L','XL','XXL'],colors:mc('English')},
];

let lang='ar',cart=[],cur=null,selColor=0,selSize=null,qty=1,prevView='home',toastTimer=null;

function applyLang(){
  document.documentElement.lang=lang;
  document.documentElement.dir=lang==='ar'?'rtl':'ltr';
  document.querySelectorAll('.t[data-ar]').forEach(el=>el.textContent=lang==='ar'?el.dataset.ar:el.dataset.en);
  document.getElementById('langBtn').textContent=lang==='ar'?'EN':'عر';
  ['logoImgAr','shopLogoAr1','shopLogoAr2','shopLogoAr4','shopLogoAr5'].forEach(id=>{const el=document.getElementById(id);if(el)el.style.display=lang==='ar'?'block':'none'});
  ['logoImgEn','shopLogoEn1','shopLogoEn2','shopLogoEn4','shopLogoEn5'].forEach(id=>{const el=document.getElementById(id);if(el)el.style.display=lang==='en'?'block':'none'});
  document.getElementById('backArrow').textContent=lang==='ar'?'←':'→';
  renderGrids();if(cur)renderProd(cur);renderCart();renderCheckout();
}
function toggleLang(){lang=lang==='ar'?'en':'ar';applyLang()}

function showView(n){
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  document.getElementById('view-'+n).classList.add('active');
  if(!['product','checkout','success'].includes(n))prevView=n;
  window.scrollTo(0,0);
}
function goHome(){showView('home')}
function setActiveNav(b){document.querySelectorAll('.nav-page-btn').forEach(x=>x.classList.remove('active-nav'));if(b)b.classList.add('active-nav')}
function openSidebar(){document.getElementById('sidebar').classList.add('open');document.getElementById('sbOverlay').classList.add('open');document.getElementById('sbCartCount').textContent=cart.reduce((a,i)=>a+i.qty,0)+' items'}
function closeSidebar(){document.getElementById('sidebar').classList.remove('open');document.getElementById('sbOverlay').classList.remove('open')}

function makeCard(p){
  const c=p.colors[0],name=lang==='ar'?p.nameAr:p.nameEn;
  const cat=lang==='ar'?(p.cat==='half'?'نص كم — يونيسيكس':'كم طويل — محجبات'):(p.cat==='half'?'Half Sleeve — Unisex':'Long Sleeve — Hijabi');
  const badge=p.badge==='new'?(lang==='ar'?'جديد':'New'):'';
  return `<div class="card" onclick="openProduct(${p.id})">
    <div class="card-img">
      <img src="${c.img}" alt="${name}" loading="lazy"/>
      ${badge?`<span class="card-badge">${badge}</span>`:''}
    </div>
    <div class="card-name">${name}</div>
    <div class="card-cat">${cat}</div>
    <div class="card-bottom">
      <div class="card-price">${p.price} EGP</div>
      <div class="card-dots">${p.colors.map(col=>`<div class="cdot" style="background:${col.hex};${col.hex==='#f0f0f0'?'border-color:#ccc':''}"></div>`).join('')}</div>
    </div>
    <div class="card-btns">
      <button class="card-btn-buy" onclick="event.stopPropagation();cardBuyNow(${p.id})">${lang==='ar'?'اشتري دلوقتي':'Buy Now'}</button>
      <button class="add-quick" onclick="event.stopPropagation();quickAdd(${p.id})">${lang==='ar'?'أضف للعربة':'Add to Cart'}</button>
    </div>
  </div>`;
}
function renderGrids(){
  document.getElementById('grid-half').innerHTML=PRODUCTS.filter(p=>p.cat==='half').map(makeCard).join('');
  document.getElementById('grid-full').innerHTML=PRODUCTS.filter(p=>p.cat==='full').map(makeCard).join('');
}
function cardBuyNow(id){const p=PRODUCTS.find(x=>x.id===id);addToCart(p,p.sizes[1]||p.sizes[0],p.colors[0],1);goCheckout()}

function openProduct(id){
  cur=PRODUCTS.find(p=>p.id===id);selColor=0;selSize=cur.sizes[1]||cur.sizes[0];qty=1;
  renderProd(cur);showView('product');
}
function renderProd(p){
  const col=p.colors[selColor];
  document.getElementById('prodName').textContent=lang==='ar'?p.nameAr:p.nameEn;
  document.getElementById('prodPrice').textContent=p.price+' EGP';
  document.getElementById('prodCat').textContent=lang==='ar'?(p.cat==='half'?'نص كم — يونيسيكس':'كم طويل — محجبات'):(p.cat==='half'?'Half Sleeve — Unisex':'Long Sleeve — Hijabi');
  document.getElementById('prodDesc').textContent=lang==='ar'?p.descAr:p.descEn;
  document.getElementById('mainImg').src=col.img;
  document.getElementById('colorLabel').textContent=lang==='ar'?col.nameAr:col.nameEn;
  document.getElementById('qtyVal').value=qty;
  document.getElementById('buyNow').textContent=lang==='ar'?'اشتري دلوقتي':'Buy Now';
  document.getElementById('addCartBtn').textContent=lang==='ar'?'أضف للعربة':'Add to Cart';
  const notice=document.querySelector('#view-product .prod-notice');
  notice.textContent=lang==='ar'?notice.dataset.ar:notice.dataset.en;
  document.getElementById('thumbsRow').innerHTML=p.colors.map((c,i)=>`<img class="thumb ${i===selColor?'active':''}" src="${c.img}" onclick="switchColor(${i})" alt=""/>`).join('');
  document.getElementById('colorOpts').innerHTML=p.colors.map((c,i)=>`<div class="color-sw ${i===selColor?'active':''}" style="background:${c.hex};${c.hex==='#f0f0f0'?'border-color:#bbb!important':''}" onclick="switchColor(${i})"></div>`).join('');
  document.getElementById('sizeOpts').innerHTML=p.sizes.map(s=>`<button class="sz ${s===selSize?'active':''}" onclick="selectSize('${s}')">${s}</button>`).join('');
}
function switchColor(i){
  selColor=i;const col=cur.colors[i];
  const img=document.getElementById('mainImg');img.style.opacity='0';
  setTimeout(()=>{img.src=col.img;img.style.opacity='1'},220);
  document.querySelectorAll('.thumb').forEach((t,idx)=>t.classList.toggle('active',idx===i));
  document.querySelectorAll('.color-sw').forEach((c,idx)=>c.classList.toggle('active',idx===i));
  document.getElementById('colorLabel').textContent=lang==='ar'?col.nameAr:col.nameEn;
}
function selectSize(s){selSize=s;document.querySelectorAll('.sz').forEach(el=>el.classList.toggle('active',el.textContent===s))}
document.getElementById('qtyMinus').onclick=()=>{if(qty>1){qty--;document.getElementById('qtyVal').value=qty}};
document.getElementById('qtyPlus').onclick=()=>{if(qty<10){qty++;document.getElementById('qtyVal').value=qty}};
document.getElementById('backBtn').onclick=()=>showView(prevView);
document.getElementById('addCartBtn').onclick=()=>{if(cur)addToCart(cur,selSize,cur.colors[selColor],qty)};
document.getElementById('buyNow').onclick=()=>{if(cur){addToCart(cur,selSize,cur.colors[selColor],qty);goCheckout()}};

function addToCart(p,size,color,amount){
  const ex=cart.find(i=>i.id===p.id&&i.size===size&&i.colorHex===color.hex);
  if(ex)ex.qty+=amount;
  else cart.push({id:p.id,nameAr:p.nameAr,nameEn:p.nameEn,price:p.price,size,colorHex:color.hex,colorAr:color.nameAr,colorEn:color.nameEn,img:color.img,qty:amount});
  updateBadge();showToast(p);
}
function quickAdd(id){const p=PRODUCTS.find(x=>x.id===id);addToCart(p,p.sizes[1]||p.sizes[0],p.colors[0],1)}
function updateBadge(){const n=cart.reduce((a,i)=>a+i.qty,0);const b=document.getElementById('cartBadge');b.textContent=n;b.classList.toggle('show',n>0)}
function renderCart(){
  const body=document.getElementById('cBody'),foot=document.getElementById('cFoot');
  if(!cart.length){body.innerHTML='<p class="c-empty">'+(lang==='ar'?'العربة فاضية':'Your cart is empty')+'</p>';foot.style.display='none';return}
  foot.style.display='block';
  const btn=document.querySelector('.co-btn-drawer');if(btn)btn.textContent=lang==='ar'?'إتمام الشراء':'Checkout';
  body.innerHTML=cart.map((item,i)=>`
    <div class="ci"><img src="${item.img}" alt=""/>
    <div><div class="ci-name">${lang==='ar'?item.nameAr:item.nameEn}</div>
    <div class="ci-sub">${item.size} · ${lang==='ar'?item.colorAr:item.colorEn} · ×${item.qty}</div>
    <button class="ci-rm" onclick="removeItem(${i})">${lang==='ar'?'إزالة':'Remove'}</button></div>
    <div class="ci-price">${item.price*item.qty} EGP</div></div>`).join('');
  document.getElementById('cTotal').textContent=cart.reduce((a,i)=>a+i.price*i.qty,0)+' EGP';
}
function removeItem(i){cart.splice(i,1);updateBadge();renderCart()}
function openCart(){renderCart();document.getElementById('cDrawer').classList.add('open');document.getElementById('cOverlay').classList.add('open')}
function closeCart(){document.getElementById('cDrawer').classList.remove('open');document.getElementById('cOverlay').classList.remove('open')}
document.getElementById('cartBtn').onclick=openCart;

function goCheckout(){closeCart();renderCheckout();showView('checkout')}
function renderCheckout(){
  const sub=cart.reduce((a,i)=>a+i.price*i.qty,0);
  document.getElementById('osItems').innerHTML=cart.map(item=>`
    <div class="order-item"><img src="${item.img}" alt=""/>
    <div><div class="order-item-name">${lang==='ar'?item.nameAr:item.nameEn}</div>
    <div class="order-item-sub">${item.size} · ${lang==='ar'?item.colorAr:item.colorEn} · ×${item.qty}</div></div>
    <div class="order-item-price">${item.price*item.qty} EGP</div></div>`).join('')
    || `<p style="font-size:.78rem;color:var(--muted)">${lang==='ar'?'لا يوجد منتجات':'No items'}</p>`;
  document.getElementById('osSubtotal').textContent=sub+' EGP';
  document.getElementById('osTotal').textContent=sub+' EGP';
  document.querySelectorAll('#view-checkout .t[data-ar]').forEach(el=>el.textContent=lang==='ar'?el.dataset.ar:el.dataset.en);
  const btn=document.getElementById('placeOrderBtn');if(btn)btn.textContent=lang==='ar'?'تأكيد الطلب':'Place Order';
}

document.getElementById('placeOrderBtn').onclick=async function(){
  const first=document.getElementById('coFirst').value.trim();
  const last=document.getElementById('coLast').value.trim();
  const phone=document.getElementById('coPhone').value.trim();
  const gov=document.getElementById('coGov').value;
  const district=document.getElementById('coDistrict').value.trim();
  const street=document.getElementById('coStreet').value.trim();
  const buildName=document.getElementById('coBuilding').value.trim();
  const buildNum=document.getElementById('coBuildNum').value.trim();
  const floor=document.getElementById('coFloor').value.trim();
  const apt=document.getElementById('coApt').value.trim();
  const landmark=document.getElementById('coLandmark').value.trim();
  const notes=document.getElementById('coNotes').value.trim();
  const payment=document.querySelector('input[name="payment"]:checked').value;

  if(!first||!phone||!gov||!district||!street||!buildNum){
    alert(lang==='ar'?'من فضلك اكمل البيانات المطلوبة':'Please fill in all required fields');return;
  }
  if(!cart.length){alert(lang==='ar'?'العربة فاضية':'Your cart is empty');return}

  const total=cart.reduce((a,i)=>a+i.price*i.qty,0);
  const itemsData=cart.map(i=>({name:i.nameAr+' / '+i.nameEn,size:i.size,color:i.colorAr+' / '+i.colorEn,qty:i.qty,price:i.price}));

  const btn=this;btn.disabled=true;btn.textContent=lang==='ar'?'جاري الإرسال...':'Submitting...';

  const {error}=await sb.from('orders').insert([{
    first_name:first,last_name:last,phone,governorate:gov,
    district,street,building_name:buildName,building_number:buildNum,
    floor_number:floor,apartment_number:apt,landmark,notes,
    payment_method:payment,items:itemsData,total,status:'new'
  }]);

  if(error){
    console.error(error);
    alert(lang==='ar'?'حصل خطأ، حاولي تاني':'Something went wrong, please try again');
    btn.disabled=false;btn.textContent=lang==='ar'?'تأكيد الطلب':'Place Order';return;
  }

  try{
    await fetch('https://axoyqisvnmkgbuvklvis.supabase.co/functions/v1/send-order-email',{
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':'Bearer sb_publishable_VJHuyzV-YTy_L3ia1ss8QA_gn4J6qlu'},
      body:JSON.stringify({first_name:first,last_name:last,phone,governorate:gov,district,street,building_name:buildName,building_number:buildNum,floor_number:floor,apartment_number:apt,landmark,notes,payment_method:payment,items:itemsData,total})
    });
  }catch(e){console.error('Email:',e)}

  showView('success');
};

function showToast(p){
  const t=document.getElementById('toast');
  document.getElementById('toastTxt').textContent=lang==='ar'?'✓ '+p.nameAr+' أُضيف':'✓ '+p.nameEn+' added';
  document.getElementById('toastCo').textContent=lang==='ar'?'اشتري دلوقتي':'Buy Now';
  document.getElementById('toastView').textContent=lang==='ar'?'العربة':'Cart';
  t.classList.add('show');clearTimeout(toastTimer);toastTimer=setTimeout(()=>t.classList.remove('show'),3500);
}
function closeToast(){document.getElementById('toast').classList.remove('show')}

applyLang();
</script>
</body>
</html>
